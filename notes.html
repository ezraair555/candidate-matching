<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Notes - Candidate Matcher</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .notes-header {
            background: linear-gradient(135deg, #0066cc 0%, #004c99 100%);
            color: white;
            padding: 30px;
            margin: -20px -20px 30px -20px;
            border-radius: 6px 6px 0 0;
        }
        
        .notes-header h1 {
            margin-bottom: 10px;
        }
        
        .notes-header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .notes-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .note-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--primary);
        }
        
        .note-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .candidate-info h3 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }
        
        .candidate-info .title {
            color: var(--text-muted);
            font-size: 14px;
        }
        
        .note-meta {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .note-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .rating-display {
            font-size: 16px;
            letter-spacing: 2px;
        }
        
        .note-body {
            line-height: 1.7;
            color: var(--text);
            white-space: pre-wrap;
        }
        
        .note-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .job-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        
        .job-tag {
            padding: 4px 12px;
            background: var(--primary-light);
            color: var(--primary-dark);
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
        }
        
        .empty-state h2 {
            font-size: 20px;
            margin-bottom: 10px;
            color: var(--text);
        }
        
        .back-link {
            display: inline-block;
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: var(--radius);
            font-weight: 500;
            margin-bottom: 20px;
            transition: all 0.2s;
        }
        
        .back-link:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }
        
        .export-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .export-actions .btn {
            flex: 0 0 auto;
            width: auto;
            padding: 10px 20px;
        }
        
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .stat-item {
            background: white;
            padding: 16px 24px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        
        @media (max-width: 600px) {
            .note-card-header {
                flex-direction: column;
                gap: 12px;
            }
            
            .note-meta {
                flex-direction: column;
                gap: 8px;
            }
            
            .stats-bar {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to Candidate Matcher</a>
        
        <div class="notes-header">
            <h1>📝 Candidate Notes</h1>
            <p>View and manage all your saved candidate notes</p>
        </div>
        
        <div class="export-actions">
            <button onclick="exportToCSV()" class="btn btn-primary">📊 Export CSV</button>
            <button onclick="exportToJSON()" class="btn btn-secondary">📄 Export JSON</button>
            <button onclick="clearAllNotes()" class="btn btn-secondary" style="background: var(--danger);">🗑️ Clear All Notes</button>
        </div>
        
        <div class="stats-bar" id="statsBar"></div>
        
        <div class="notes-container" id="notesContainer">
            <div class="empty-state">
                <h2>No notes yet</h2>
                <p>Start adding notes to candidates from the main matching page.</p>
            </div>
        </div>
    </div>
    
    <script>
        // Load and display all notes
        document.addEventListener('DOMContentLoaded', loadAllNotes);
        
        function getNotesKey() {
            return 'candidate_matcher_notes';
        }
        
        function getAllNotes() {
            try {
                const data = localStorage.getItem(getNotesKey());
                return data ? JSON.parse(data) : {};
            } catch (e) {
                console.error('Error reading notes:', e);
                return {};
            }
        }
        
        async function loadCandidates() {
            try {
                const response = await fetch('candidates.json');
                if (!response.ok) throw new Error('Failed to load candidates');
                return await response.json();
            } catch (e) {
                console.error('Error loading candidates:', e);
                return [];
            }
        }
        
        async function loadJobs() {
            try {
                const response = await fetch('jobs.json');
                if (!response.ok) throw new Error('Failed to load jobs');
                return await response.json();
            } catch (e) {
                console.error('Error loading jobs:', e);
                return [];
            }
        }
        
        async function loadAllNotes() {
            const allNotes = getAllNotes();
            const candidates = await loadCandidates();
            const jobs = await loadJobs();
            
            // Create candidate lookup map
            const candidateMap = {};
            candidates.forEach(c => candidateMap[c.candidate_id] = c);
            
            // Create job lookup map
            const jobMap = {};
            jobs.forEach(j => jobMap[j.job_id] = j);
            
            // Flatten all notes with candidate info
            let allNotesFlat = [];
            for (const [candidateId, notes] of Object.entries(allNotes)) {
                const candidate = candidateMap[candidateId] || {};
                notes.forEach(note => {
                    allNotesFlat.push({
                        candidate_id: parseInt(candidateId),
                        first_name: candidate.first_name || 'Unknown',
                        last_name: candidate.last_name || '',
                        email: candidate.email || '',
                        current_title: candidate.current_title || '',
                        current_company: candidate.current_company || '',
                        location: candidate.location || '',
                        years_experience: candidate.years_experience || 0,
                        skills: candidate.skills || [],
                        note_text: note.note_text,
                        rating: note.rating || 0,
                        created_at: note.created_at,
                        updated_at: note.updated_at
                    });
                });
            }
            
            // Sort by date (newest first)
            allNotesFlat.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            
            // Update stats
            updateStats(allNotesFlat);
            
            // Render notes
            renderNotes(allNotesFlat);
        }
        
        function updateStats(notes) {
            const totalNotes = notes.length;
            const uniqueCandidates = new Set(notes.map(n => n.candidate_id)).size;
            const avgRating = notes.filter(n => n.rating > 0).length > 0 
                ? (notes.filter(n => n.rating > 0).reduce((sum, n) => sum + n.rating, 0) / notes.filter(n => n.rating > 0).length).toFixed(1)
                : 'N/A';
            
            document.getElementById('statsBar').innerHTML = `
                <div class="stat-item">
                    <div class="stat-value">${totalNotes}</div>
                    <div class="stat-label">Total Notes</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${uniqueCandidates}</div>
                    <div class="stat-label">Candidates with Notes</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${avgRating}</div>
                    <div class="stat-label">Average Rating</div>
                </div>
            `;
        }
        
        function renderNotes(notes) {
            const container = document.getElementById('notesContainer');
            
            if (notes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h2>No notes yet</h2>
                        <p>Start adding notes to candidates from the main matching page.</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = notes.map(note => `
                <div class="note-card">
                    <div class="note-card-header">
                        <div class="candidate-info">
                            <h3>${escapeHtml(note.first_name)} ${escapeHtml(note.last_name)}</h3>
                            <div class="title">${escapeHtml(note.current_title)}${note.current_company ? ' at ' + escapeHtml(note.current_company) : ''}</div>
                            <div class="job-tags">
                                ${note.skills.slice(0, 5).map(s => `<span class="job-tag">${escapeHtml(s)}</span>`).join('')}
                                ${note.skills.length > 5 ? `<span class="job-tag">+${note.skills.length - 5} more</span>` : ''}
                            </div>
                        </div>
                        <div class="note-meta">
                            <div class="note-meta-item">
                                <span class="rating-display">${'⭐'.repeat(note.rating)}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="note-body">${escapeHtml(note.note_text)}</div>
                    
                    <div class="note-footer">
                        <div class="note-meta">
                            <div class="note-meta-item">
                                📍 ${escapeHtml(note.location || 'Unknown')}
                            </div>
                            <div class="note-meta-item">
                                💼 ${note.years_experience} yrs exp
                            </div>
                            ${note.email ? `<div class="note-meta-item">✉️ ${escapeHtml(note.email)}</div>` : ''}
                        </div>
                        <div>
                            📅 ${new Date(note.created_at).toLocaleString()}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function exportToCSV() {
            const allNotes = getAllNotes();
            
            // Load candidates for full data
            Promise.all([loadCandidates(), loadJobs()]).then(([candidates, jobs]) => {
                const candidateMap = {};
                candidates.forEach(c => candidateMap[c.candidate_id] = c);
                
                const headers = [
                    'Candidate ID', 'First Name', 'Last Name', 'Email', 'Current Title',
                    'Company', 'Location', 'Years Experience', 'Skills', 'Rating', 'Note', 'Created At'
                ];
                
                const rows = [];
                for (const [candidateId, notes] of Object.entries(allNotes)) {
                    const c = candidateMap[candidateId] || {};
                    notes.forEach(note => {
                        rows.push([
                            c.candidate_id || candidateId,
                            c.first_name || '',
                            c.last_name || '',
                            c.email || '',
                            c.current_title || '',
                            c.current_company || '',
                            c.location || '',
                            c.years_experience || 0,
                            (c.skills || []).join('; '),
                            note.rating || 0,
                            note.note_text,
                            note.created_at
                        ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(','));
                    });
                }
                
                const csv = [headers.join(','), ...rows].join('\n');
                downloadFile(csv, `candidate_notes_${new Date().toISOString().split('T')[0]}.csv`, 'text/csv');
            });
        }
        
        function exportToJSON() {
            const allNotes = getAllNotes();
            
            Promise.all([loadCandidates(), loadJobs()]).then(([candidates, jobs]) => {
                const candidateMap = {};
                candidates.forEach(c => candidateMap[c.candidate_id] = c);
                
                const exportData = {
                    exported_at: new Date().toISOString(),
                    total_notes: Object.values(allNotes).flat().length,
                    notes: []
                };
                
                for (const [candidateId, notes] of Object.entries(allNotes)) {
                    const c = candidateMap[candidateId] || {};
                    exportData.notes.push({
                        candidate: {
                            candidate_id: c.candidate_id || parseInt(candidateId),
                            first_name: c.first_name || '',
                            last_name: c.last_name || '',
                            email: c.email || '',
                            current_title: c.current_title || '',
                            current_company: c.current_company || '',
                            location: c.location || '',
                            years_experience: c.years_experience || 0,
                            skills: c.skills || []
                        },
                        notes: notes
                    });
                }
                
                downloadFile(JSON.stringify(exportData, null, 2), `candidate_notes_${new Date().toISOString().split('T')[0]}.json`, 'application/json');
            });
        }
        
        function clearAllNotes() {
            if (confirm('Are you sure you want to delete ALL notes? This cannot be undone.')) {
                localStorage.removeItem(getNotesKey());
                loadAllNotes();
                alert('All notes have been cleared.');
            }
        }
        
        function downloadFile(content, filename, mimeType) {
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
